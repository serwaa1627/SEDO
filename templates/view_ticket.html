<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Ticket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include "navbar.html" %}
    <div class="container page-card">
        <h2>Ticket Details</h2>
        <div class="ticket-detail">
            <div class="label-title">Title</div>
            <div>{{ ticket.title }}</div>
        </div>
        <div class="ticket-detail">
            <div class="label-title">Description</div>
            <div class="preserve-lines">{{ ticket.description }}</div>
        </div>
        <div class="ticket-detail">
            <div class="label-title">Status</div>
            <div>{{ ticket.status }}</div>
        </div>
        <div class="ticket-detail">
            <div class="label-title">Priority</div>
            <div>{{ ticket.priority }}</div>
        </div>
        <div class="d-flex gap-4 justify-content-center">
            <a href="{{ url_for('edit_ticket', ticket_id=ticket.id) }}" class="btn btn-primary">Edit Ticket</a>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
